sonar.projectKey=gutti666_sonarcloud-pipeline
sonar.organization=gutti666

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=sonarcloud-pipeline
sonar.projectVersion=1.0

# Source files
sonar.sources=main.py
sonar.tests=test_main.py
sonar.python.version=3

# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Exclude cache and compiled files
sonar.exclusions=**/__pycache__/**,**/*.pyc

sonar.sourceEncoding=UTF-8